name: dense-multilingual-e5-base

data:
  data_path: data/processed

retrieval:
  method: dense
  top_k: 100
  params:
    model_name: intfloat/multilingual-e5-base
    segmentation: null
    encode_kwargs: { batch_size: 128, show_progress_bar: true }
    max_length: 512

reranking: null

evaluation:
  metrics:
    - { name: mrr@10, fn: mrr_at_k, k: 10 }
    - { name: success@100, fn: success_at_k, k: 100 }

output:
  scores: results/dense-selection/e5-base-scores.json
