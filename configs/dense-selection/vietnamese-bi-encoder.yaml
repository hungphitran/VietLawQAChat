name: dense-vietnamese-bi-encoder

data:
  data_path: data/processed

retrieval:
  method: dense
  top_k: 100
  params:
    model_name: bkai-foundation-models/vietnamese-bi-encoder
    segmentation: pyvi
    encode_kwargs: { batch_size: 256, show_progress_bar: true }
    max_length: 256

reranking: null

evaluation:
  metrics:
    - { name: mrr@10, fn: mrr_at_k, k: 10 }
    - { name: success@100, fn: success_at_k, k: 100 }

output:
  scores: results/dense-selection/vietnamese-bi-encoder-scores.json
