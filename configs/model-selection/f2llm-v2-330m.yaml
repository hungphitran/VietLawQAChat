name: zero-shot-F2LLM-v2-330M

data:
  data_path: data/processed
  corpus_from: eval

retrieval:
  method: dense
  top_k: 100
  params:
    model_name: codefuse-ai/F2LLM-v2-330M
    encode_kwargs: { batch_size: 64 }
    max_length: 512

reranking: null

evaluation:
  metrics:
    all

output:
  predictions: results/model-selection/F2LLM-v2-330M/outputeval.txt
  scores: results/model-selection/F2LLM-v2-330M/scores.json
