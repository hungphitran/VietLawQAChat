name: zero-shot-phobert-base-v2

data:
  data_path: data/processed
  corpus_from: eval

retrieval:
  method: dense
  top_k: 100
  params:
    model_name: vinai/phobert-base-v2
    segmentation: pyvi
    encode_kwargs: { batch_size: 64 }
    max_length: 256

reranking: null

evaluation:
  metrics:
    all

output:
  predictions: results/model-selection/phobert-base-v2/outputeval.txt
  scores: results/model-selection/phobert-base-v2/scores.json
